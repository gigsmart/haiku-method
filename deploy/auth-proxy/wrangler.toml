name = "haiku-auth-proxy"
main = "worker.ts"
compatibility_date = "2024-12-01"

# ALLOWED_ORIGIN and custom domain are configured per-deployment:
# - Production: auth.haikumethod.ai → haikumethod.ai
# - Fork: haiku-auth.jasonwaldrip.dev → fork's site URL
#
# Set ALLOWED_ORIGIN via wrangler secret or Cloudflare dashboard.
# Set custom domain via Cloudflare Workers > Triggers > Custom Domains.
#
# Secrets (set via CI or wrangler secret put):
#   HAIKU_GITHUB_OAUTH_CLIENT_ID
#   HAIKU_GITHUB_OAUTH_CLIENT_SECRET
#   ALLOWED_ORIGIN
