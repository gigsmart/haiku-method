    text: "Build a new-hire onboarding program for the engineering team."
  - role: agent
    text: "How long is the program — week one, first month, first 90 days?"
  - role: user
    text: "First 30 days. Structured, with explicit milestones."
  - role: agent
    text: "Shipping a real change in week one, or ramp-up only?"
